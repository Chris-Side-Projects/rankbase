<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="description" content="Head-to-head ELO ranking for AI-generated images." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rankbase" />
    <meta property="og:title" content="Rankbase" />
    <meta property="og:description" content="Head-to-head ELO ranking for AI-generated images." />
    <meta property="og:image" content="/icon-pwa.svg" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rankbase" />
    <meta name="twitter:description" content="Head-to-head ELO ranking for AI-generated images." />
    <meta name="twitter:image" content="/icon-pwa.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Rankbase</title>
    <!-- Preempt the flash-of-wrong-theme: read the stored or system preference
         and set data-theme on the html element before React mounts. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
